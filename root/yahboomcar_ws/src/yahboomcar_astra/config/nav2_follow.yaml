# 路 B map-less 跟人 Nav2 配置。
# 从本车调好的 yahboomcar_nav/params/dwb_nav_params.yaml 裁剪而来（见 memory pathb-nav2-probe）：
#   * 砍掉 amcl / map_server —— 无全局地图、无定位，直接在 odom 帧里导航。
#   * global_costmap: global_frame map→odom + rolling_window:true + 去 static_layer。
#   * local_costmap 原样（原厂已是 odom + rolling）。
#   * controller 复用原厂调好的差速 DWB；planner NavfnPlanner(allow_unknown)。
# 帧（探针核实）：odom→base_footprint→base_link→radar_Link；odom 话题 /odom；差速。
# 不含 amcl/map_server，lifecycle_manager 的 node_names 也不要列它们（见 launch）。

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: odom          # ← map-less：BT/导航都在 odom 帧
    robot_base_frame: base_link
    odom_topic: /odom           # ← 探针确认：EKF 融合后的 /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # 用 nav2 内置默认 BT（navigate_to_pose + navigate_through_poses 都会加载，
    # 故插件列表必须完整——原厂 dwb_nav_params 全量，别裁剪，否则 bt_navigator 起不来）。
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25       # 跟人：到 standoff 附近即算达成
      yaw_goal_tolerance: 0.5       # 放宽朝向，减少原地拧
    FollowPath:                      # 差速 RPP —— 纯几何跟线，不做轨迹采样，CPU 比 DWB 低一个数量级
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.30
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false   # 跟人：目标本身是雷达障碍，开着会误报"前方碰撞"→abort→呆立；避障交给 planner 绕
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true    # 转弯/近障碍自动减速
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true                    # 差速：大转角先原地转到航向再走（无横移）
      rotate_to_heading_min_angle: 0.785
      rotate_to_heading_angular_vel: 0.8
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0
      allow_reversing: false                         # 与 use_rotate_to_heading 二选一

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22
      plugins: ["obstacle_layer", "inflation_layer"]   # 去掉 voxel/static，2D obstacle 更省 CPU
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0   # 越大代价衰减越陡：只避近障碍，远处障碍不再让路径绕
        inflation_radius: 0.30   # 跟人：小些才靠得近到 standoff、也更能钻缝、少绕远
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0         # 障碍更快进图，planner 少用旧图规划失败→少 recovery
      publish_frequency: 1.0
      global_frame: odom            # ← map-less：全局代价图也跟 odom rolling
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true          # ← 无 static map，跟车滚动
      width: 8                      # 8×8(±4m)：人离远时 goal 仍在 costmap 内，否则 planner 失败→recovery→呆立
      height: 8
      resolution: 0.05
      robot_radius: 0.22
      track_unknown_space: false    # 未知当空闲，跟人时能规划到没扫到的地方
      plugins: ["obstacle_layer", "inflation_layer"]   # ← 去 static_layer
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0   # 越大代价衰减越陡：只避近障碍，远处障碍不再让路径绕
        inflation_radius: 0.30   # 跟人：小些才靠得近到 standoff、也更能钻缝、少绕远
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
